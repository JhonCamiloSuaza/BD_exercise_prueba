databaseChangeLog:
  - changeSet:
      id: 004-create-table-prestamo
      author: Jhon Camilo Suaza Sanchez
      comment: "Crear tabla prestamo - Entidad secundaria (relación usuario-libro)"
      changes:
        - createTable:
            tableName: prestamo
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: uuid_generate_v4()
                  constraints:
                    primaryKey: true
                    nullable: false
                    primaryKeyName: pk_prestamo
              - column:
                  name: usuario_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: libro_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: fecha_prestamo
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: fecha_devolucion
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: estado
                  type: VARCHAR(20)
                  defaultValue: ACTIVO
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: prestamo
            baseColumnNames: usuario_id
            referencedTableName: usuario
            referencedColumnNames: id
            constraintName: fk_prestamo_usuario
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: prestamo
            baseColumnNames: libro_id
            referencedTableName: libro
            referencedColumnNames: id
            constraintName: fk_prestamo_libro
            onDelete: CASCADE
      rollback:
        - dropTable:
            tableName: prestamo
