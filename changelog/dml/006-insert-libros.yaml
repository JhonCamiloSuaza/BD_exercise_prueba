            tableName: libro
            columns:
              - column: { name: id, valueComputed: "uuid_generate_v4()" }
              - column: { name: titulo, value: "Don Quijote de la Mancha" }
              - column: { name: autor, value: "Miguel de Cervantes" }
              - column: { name: isbn, value: "978-84-376-0494-7" }
              - column: { name: genero, value: "Novela" }
