databaseChangeLog:
  - changeSet:
      id: 001-create-extension-uuid
      author: Jhon Camilo Suaza Sanchez
      comment: "Habilitar la extensión uuid-ossp para generación de UUIDs"
      changes:
        - sql:
            sql: CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
      rollback:
        - sql:
            sql: DROP EXTENSION IF EXISTS "uuid-ossp";
