databaseChangeLog:
  - changeSet:
      id: 002-create-table-usuario
      author: Jhon Camilo Suaza Sanchez
      comment: "Crear tabla usuario - Entidad primaria del sistema"
      changes:
        - createTable:
            tableName: usuario
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: uuid_generate_v4()
                  constraints:
                    primaryKey: true
                    nullable: false
                    primaryKeyName: pk_usuario
              - column:
                  name: nombre
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: apellido
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_usuario_email
              - column:
                  name: telefono
                  type: VARCHAR(20)
                  constraints:
                    nullable: true
              - column:
                  name: fecha_registro
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: activo
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: usuario
