databaseChangeLog:
  - changeSet:
      id: 006-insert-libros
      author: Jhon Camilo Suaza Sanchez
      comment: "Insertar datos iniciales de libros"
      changes:
        - insert:
            tableName: libro
            columns:
              - column: { name: id, valueComputed: "uuid_generate_v4()" }
              - column: { name: titulo, value: "Cien Años de Soledad" }
              - column: { name: autor, value: "Gabriel García Márquez" }
              - column: { name: isbn, value: "978-0-06-088328-7" }
              - column: { name: genero, value: "Realismo Mágico" }
              - column: { name: fecha_publicacion, valueDate: "1967-06-05" }
              - column: { name: disponible, valueBoolean: true }
